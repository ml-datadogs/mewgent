name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  typescript_ui:
    name: Lint and build TypeScript / React overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: go-task/setup-task@v1

      - name: task check:ui
        run: task check:ui

  python_quality:
    name: Lint, type-check, and test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: go-task/setup-task@v1

      - name: Install Python dependencies
        run: uv sync --dev

      - name: task check:python
        run: task check:python
