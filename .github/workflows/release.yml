name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build React UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Create .env for bundling
        run: echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > src/.env

      - name: Bundle with PyInstaller
        run: uv run pyinstaller mewgent.spec --noconfirm

      - name: Create release zip
        run: Compress-Archive -Path dist/mewgent/* -DestinationPath mewgent-${{ github.ref_name }}-win64.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mewgent-${{ github.ref_name }}-win64.zip
          generate_release_notes: true
