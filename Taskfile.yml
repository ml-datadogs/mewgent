version: "3"

tasks:
  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check .

  format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format .

  format:check:
    desc: Check formatting without making changes
    cmds:
      - uv run ruff format --check .

  typecheck:
    desc: Run ty type checker
    cmds:
      - uv run ty check

  lint:ui:
    desc: Run ESLint on React frontend
    dir: ui
    cmds:
      - npm run lint

  ui:npm-ci:
    internal: true
    desc: Install UI dependencies with npm ci
    dir: ui
    cmds:
      - npm ci

  build:ui:compile:
    internal: true
    desc: Production Vite build (expects node_modules)
    dir: ui
    cmds:
      - npm run build

  check:ui:
    desc: CI / parallel job — npm ci, ESLint, Vite production build
    cmds:
      - task: ui:npm-ci
      - task: lint:ui
      - task: build:ui:compile

  check:python:
    desc: CI / parallel job — ruff, format check, ty, pytest
    cmds:
      - task: lint
      - task: format:check
      - task: typecheck
      - task: test

  check:
    desc: All checks (check:ui then check:python — matches full CI surface)
    cmds:
      - task: check:ui
      - task: check:python

  fix:
    desc: Auto-fix lint errors and format code
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .
      - task: fix:ui

  fix:ui:
    desc: Auto-fix ESLint errors in React frontend
    dir: ui
    cmds:
      - npx eslint . --fix

  test:
    desc: Run pytest test suite
    cmds:
      - uv run pytest

  build:ui:
    desc: Build React frontend
    cmds:
      - task: ui:npm-ci
      - task: build:ui:compile

  build:exe:
    desc: Bundle into Windows executable with PyInstaller
    deps: [build:ui]
    cmds:
      - uv run pyinstaller mewgent.spec --noconfirm

  dev:ui:deps:
    desc: Install UI npm dependencies when missing or stale
    internal: true
    dir: ui
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.bin/vite
    cmds:
      - npm install

  dev:vite:
    desc: Run Vite dev server (background; used by task dev)
    internal: true
    dir: ui
    cmds:
      - npm run dev
    background: true

  dev:wait-vite:
    desc: Block until Vite listens on 5173
    internal: true
    dir: ui
    cmds:
      - npm run wait:vite

  dev:
    desc: Start Vite (hot reload) and Mewgent overlay (--dev-ui, mock save if no file)
    deps: [dev:ui:deps]
    cmds:
      - task: dev:vite
      - task: dev:wait-vite
      - uv run python -m src.main --dev-ui

  dev:dist:
    desc: Build UI to dist/ then run the normal overlay (no Vite)
    deps: [build:ui]
    cmds:
      - uv run python -m src.main

  build:
    desc: Full build (UI + executable)
    cmds:
      - task: build:exe
